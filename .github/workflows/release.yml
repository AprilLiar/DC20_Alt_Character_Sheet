name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build module zip
        run: |
          zip -r dc20-alt-character-sheet.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            lang/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dc20-alt-character-sheet.zip
            module.json
          generate_release_notes: true
